<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>商場櫃位記憶測驗</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  padding: 20px;
}
.quiz-box {
  background: #fff;
  padding: 20px;
  max-width: 650px;
  margin: auto;
  border-radius: 8px;
}
.option {
  margin: 8px 0;
}
button {
  margin-top: 15px;
  padding: 8px 16px;
}
.correct {
  color: green;
}
.wrong {
  color: red;
}
</style>
</head>
<body>

<div class="quiz-box" id="quiz">
  <h2 id="question"></h2>
  <div id="options"></div>
  <p id="feedback"></p>
  <button onclick="restartQuiz()">重新開始</button>
  <p id="score"></p>
</div>

<script>
let data = [];

async function loadData() {
  try {
    const response = await fetch("https://script.google.com/macros/s/AKfycbzoWyfi7WEEEBrZm58MXEUzAyc4UlFVQNY5v8dT3qBOU7TM8JYlKcArcCwerr_ErM4R/exec");
    if (!response.ok) throw new Error("網路錯誤：" + response.status);

    const raw = await response.json();

    data = raw
      .filter(row => row["店名"] && row["位置"] && row["商品"]) // 過濾空白列
      .map(row => ({
        name: row["店名"],
        location: row["位置"],
        product: row["商品"],
        booth: row["櫃號"]
      }));

    if (data.length === 0) {
      document.getElementById("quiz").innerHTML = "<p>沒有題目資料，請檢查 Google Sheet。</p>";
      return;
    }

    restartQuiz(); // ✅ 只有資料抓到後才開始測驗
  } catch (err) {
    console.error("題目載入失敗:", err);
    document.getElementById("quiz").innerHTML = "<p>題目載入失敗，請稍後重試。</p>";
  }
}

loadData();

</script>
<script>
const QUESTION_COUNT = 20;
let questions = [];
let current = 0;
let score = 0;
let answerHistory = [];

// ✅ 正確洗牌（Fisher–Yates）
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// ✅ 隨機挑題 + 只問 地點 / 商品
function generateQuestions() {
  const shuffled = shuffle([...data]).slice(0, QUESTION_COUNT);

  questions = shuffled.map(item => {
    const type = Math.random() > 0.5 ? "location" : "product";
    return { ...item, type };
  });
}

function getCorrectAnswer(q) {
  return q.type === "location" ? q.location : q.product;
}

function getQuestionText(q) {
  return q.type === "location"
    ? `${q.name} 位於哪個位置？`
    : `${q.name} 主要販售什麼商品？`;
}

// ✅ 產生不重複選項
function generateOptions(correct, type) {
  let pool = [];

  if (type === "location") {
    pool = [...new Set(data.map(d => d.location))];
  } else {
    pool = [...new Set(data.map(d => d.product))];
  }

  pool = pool.filter(p => p !== correct);
  const wrongs = shuffle(pool).slice(0, 3);

  return shuffle([correct, ...wrongs]);
}

function showQuestion() {
  const q = questions[current];
  const correct = getCorrectAnswer(q);
  const options = generateOptions(correct, q.type);

  document.getElementById("feedback").innerHTML = "";
  document.getElementById("question").innerText =
    `第 ${current + 1} 題：${getQuestionText(q)}`;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => selectAnswer(opt, correct);
    optionsDiv.appendChild(btn);
  });

  document.getElementById("score").innerText = `目前分數：${score}`;
}

function selectAnswer(selected, correct) {
  const feedback = document.getElementById("feedback");
  const q = questions[current];
  const questionText = getQuestionText(q);

  const isCorrect = selected === correct;

  if (isCorrect) {
    score += 5;
    feedback.innerHTML = `<span class="correct">✔ 正確！</span>`;
  } else {
    feedback.innerHTML =
      `<span class="wrong">✘ 錯誤</span><br>正確答案：<b>${correct}</b>`;
  }

  // ⭐ 儲存紀錄
  answerHistory.push({
    question: questionText,
    selected: selected,
    correct: correct,
    result: isCorrect
  });

  setTimeout(() => {
    current++;
    if (current >= questions.length) {
      endQuiz();
    } else {
      showQuestion();
    }
  }, 1200);
}

function endQuiz() {
  document.getElementById("question").innerText = "測驗結束 🎉";
  document.getElementById("options").innerHTML = "";

  let resultHTML = `<h3>你的分數：${score} / ${QUESTION_COUNT * 5}</h3>`;
  resultHTML += "<hr><h3>📋 作答紀錄</h3>";

  answerHistory.forEach((item, index) => {
    resultHTML += `
      <div style="margin-bottom:10px;">
        <b>第 ${index + 1} 題：</b>${item.question}<br>
        你的答案： 
        <span class="${item.result ? 'correct' : 'wrong'}">
          ${item.selected}
        </span><br>
        正確答案： <b>${item.correct}</b>
      </div>
    `;
  });

  document.getElementById("feedback").innerHTML = resultHTML;
}

function restartQuiz() {
  current = 0;
  score = 0;
  answerHistory = [];   // ⭐ 清空紀錄
  generateQuestions();
  showQuestion();
}

</script>
